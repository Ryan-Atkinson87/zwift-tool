spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Connection pool: constrained for low-traffic hosting on Railway.
# Default maximum-pool-size is 10, which is excessive and holds memory idle.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
# Release idle connections after 10 minutes rather than holding them indefinitely.
spring.datasource.hikari.idle-timeout=600000
# Evict connections that have been alive more than 30 minutes to prevent Neon drops.
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}
app.cookie.secure=${COOKIE_SECURE}
app.cookie.domain=${COOKIE_DOMAIN:}

server.port=8080

# Sentry error tracking (disabled locally when SENTRY_DSN is not set)
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:local}
sentry.send-default-pii=false

# Structured JSON logging for production (Railway log viewer parses JSON natively)
logging.structured.format.console=logstash
logging.level.root=INFO
logging.level.uk.trive.zwifttool=INFO