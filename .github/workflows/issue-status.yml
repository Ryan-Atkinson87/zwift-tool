name: Move issue to review on commit

on:
  push:
    branches:
      - dev

jobs:
  update-issue-status:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Extract issue numbers and update labels
        run: |
          # Extract all issue numbers from commit messages in this push
          MESSAGES=$(echo '${{ toJson(github.event.commits) }}' | jq -r '.[].message')
          echo "Commit messages: $MESSAGES"

          ISSUES=$(echo "$MESSAGES" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u)
          echo "Found issue numbers: $ISSUES"

          if [ -z "$ISSUES" ]; then
            echo "No issue numbers found in commit messages, skipping."
            exit 0
          fi

          for ISSUE in $ISSUES; do
            echo "Updating issue #$ISSUE"

            # Remove in-progress and ready labels (|| true prevents failure if label not present)
            gh issue edit $ISSUE --remove-label "status: in-progress" --repo ${{ github.repository }} || true
            gh issue edit $ISSUE --remove-label "status: ready" --repo ${{ github.repository }} || true

            # Add review label
            gh issue edit $ISSUE --add-label "status: review" --repo ${{ github.repository }}

            echo "Issue #$ISSUE moved to status: review"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}